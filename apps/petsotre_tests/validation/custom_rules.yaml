
version: v1

custom_rules:
  - id: USER_ID_PRESENT
    type: equality
    jsonpath: "$.post.id"
    expected: 100
    negate: true
    message: "User ID must be present"

  - id: EMAIL_FORMAT
    type: regex
    jsonpath: "$.email"
    pattern: '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$'
    message: "Invalid email format"

  - id: AGE_RANGE
    type: range
    jsonpath: "$.age"
    min: 18
    max: 60
    message: "Age must be between 18 and 60"

  - id: STATUS_DEPENDENT_RULE
    type: conditional
    if:
      jsonpath: "$.status"
      equals: "ACTIVE"
    then:
      jsonpath: "$.deactivated_at"
      equals: null
    message: "Active users must not have deactivated_at"

  - id: AUTHOR_NAME_NO_NUMBERS
    type: regex
    jsonpath: "$.author.name"
    pattern: '^[^0-9]+$'
    message: "Author name must not contain numbers"

  - id: PAGE_RANGE
    type: range
    jsonpath: "$[*].num_pages"
    min: 1
    max: 900
    message: "Age must be between 1 and 60"

